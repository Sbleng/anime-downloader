name: Anime Downloader

on:
  workflow_dispatch:
    inputs:
      anime_url:
        description: 'URL pagina anime'
        required: true
      prefix:
        description: 'Prefisso file'
        required: true
        default: 'Anime'
      drive_folder:
        description: 'Cartella Drive'
        required: true
        default: 'Anime'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Setup
        run: |
          sudo apt update -qq
          sudo apt install -y ffmpeg rclone
          pip install yt-dlp playwright playwright-stealth requests
          playwright install chromium --with-deps

      - name: Configura rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: Scarica e carica su Drive
        env:
          ANIME_URL: ${{ github.event.inputs.anime_url }}
          PREFIX: ${{ github.event.inputs.prefix }}
          DRIVE_FOLDER: ${{ github.event.inputs.drive_folder }}
        run: |
          python3 <<'EOF'
          import os, re, subprocess, time, requests
          from playwright.sync_api import sync_playwright
          try:
              from playwright_stealth import stealth_sync
          except ImportError:
              stealth_sync = None

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit
